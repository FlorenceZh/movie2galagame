name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: movie2galagame.exe
          - os: macos-latest
            artifact_name: movie2galagame
          - os: ubuntu-latest
            artifact_name: movie2galagame

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Tk (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --onefile --windowed --name movie2galagame main.py
        shell: pwsh

      - name: Build (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          pyinstaller --onefile --windowed --name movie2galagame main.py
        shell: bash

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact_name }}
